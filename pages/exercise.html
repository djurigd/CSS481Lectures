<!DOCTYPE html>
<html>
    <head>
        <script>
            function something(){
                let table = document.createElement("table");
                const n = prompt("Size: ");
                for (let i = 1; i <= n; i++) {
                    let tr = document.createElement("tr");
                    for (let j = 1; j <= n; j++) {
                        let td = document.createElement("td");
                        td.textContent = i * j;
                        if (i === j) {
                            td.style.backgroundColor = "red";
                        }
                        tr.append(td);
                    }
                    table.append(tr);
                }
                document.body.append(table);
            }
        </script>
    </head>
    <body onload="something()">
    </body>
</html>
